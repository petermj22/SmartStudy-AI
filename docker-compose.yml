# ============================================================
# SmartStudy Docker Compose
# ============================================================
version: "3.8"

services:
  smartstudy:
    build: .
    container_name: smartstudy-app
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./ml_training/trained_models:/app/ml_training/trained_models
    devices:
      - /dev/video0:/dev/video0   # Camera passthrough (Linux only)
    environment:
      - APP_ENV=production
      - LOG_LEVEL=INFO
    restart: unless-stopped
