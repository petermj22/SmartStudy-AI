# ============================================================
# SmartStudy Logging Configuration
# ============================================================

version: 1

loggers:
  root:
    level: INFO

  smartstudy:
    level: INFO
    handlers:
      - console
      - file
      - error_file

handlers:
  console:
    sink: sys.stdout
    level: INFO
    format: "<green>{time:HH:mm:ss}</green> | <level>{level: <8}</level> | <cyan>{module}</cyan>:<cyan>{line}</cyan> - <level>{message}</level>"
    colorize: true

  file:
    sink: "logs/smartstudy_{time:YYYY-MM-DD}.log"
    level: DEBUG
    format: "{time:YYYY-MM-DD HH:mm:ss.SSS} | {level: <8} | {name}:{function}:{line} | {message}"
    rotation: "10 MB"
    retention: "30 days"
    compression: "zip"
    enqueue: true

  error_file:
    sink: "logs/errors_{time:YYYY-MM-DD}.log"
    level: ERROR
    format: "{time:YYYY-MM-DD HH:mm:ss.SSS} | {level: <8} | {name}:{function}:{line} | {message}"
    rotation: "50 MB"
    retention: "90 days"
    backtrace: true
    diagnose: true
